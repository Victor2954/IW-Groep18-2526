services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pingfin-team18
    restart: unless-stopped

    # .env wordt automatisch ingeladen door Docker Compose
    env_file: .env

    ports:
      - "3000:3000"   # host:container  -- verander de linkerkant als poort 3000 al bezet is

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
